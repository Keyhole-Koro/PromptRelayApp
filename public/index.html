<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptRelay</title>
  <meta name="description" content="PromptRelay – AI画像生成リレーゲーム" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-phase="lobby">

  <!-- Particle background -->
  <div id="particles"></div>

  <div class="page">
    <header class="topbar">
      <h1>PromptRelay</h1>
      <div class="status-wrap">
        <span id="wsStatus" class="badge">WS: connecting</span>
        <span id="gameStatus" class="badge">phase: lobby</span>
        <span id="roomStatus" class="badge">room: -</span>
      </div>
    </header>

    <section class="controls card" id="controlsSection">
      <h2>⚡ Game Controls</h2>
      <div class="control-row">
        <label class="field">
          <span>Player Name</span>
          <input id="playerName" type="text" placeholder="your name" maxlength="24" />
        </label>
      </div>
      <div class="control-row">
        <button id="createRoomBtn" type="button">🎮 ルーム作成</button>
        <input id="joinRoomCode" type="text" placeholder="ROOM CODE" maxlength="8" />
        <button id="joinRoomBtn" type="button">🚀 参加</button>
        <button id="startGameBtn" type="button">▶ 開始</button>
      </div>
      <p id="currentTurn" class="meta">Current turn: -</p>
      <p id="players" class="meta">Players: -</p>
    </section>

    <!-- Score Display (hidden until scoring phase) -->
    <section id="scoreDisplay" class="card">
      <div class="score-value" id="scoreValue">--</div>
      <div class="score-label">similarity score</div>
    </section>

    <section class="board">
      <article class="panel card">
        <h2>🎯 お題</h2>
        <div class="image-frame large">
          <img id="topicImage" alt="topic" />
          <p id="topicPlaceholder" class="placeholder">お題画像を待機中</p>
        </div>
        <p id="topicText" class="meta"></p>
      </article>

      <article class="panel card">
        <h2>🖼 プレイヤー画像</h2>
        <div class="image-frame large">
          <img id="playerImage" alt="player generated" />
          <p id="playerPlaceholder" class="placeholder">生成待機中</p>
        </div>
      </article>

      <article class="panel card ai-panel">
        <h2>🤖 AIリアルタイム</h2>
        <div class="image-frame small">
          <img id="aiImage" alt="ai generated" />
          <p id="aiPlaceholder" class="placeholder">生成待機中</p>
        </div>
      </article>
    </section>

    <section class="prompt card" id="promptSection">
      <h2>📝 プロンプト入力（10秒ごと自動送信）</h2>
      <textarea id="promptInput" placeholder="ここに追記していくと、10秒ごとにdelta送信されます"></textarea>
      <div class="timer-wrap">
        <div id="timerBar"></div>
      </div>
      <p id="autosendInfo" class="meta">next autosend: 10s</p>
    </section>

    <section class="card">
      <h2>📋 ログ</h2>
      <pre id="log" aria-live="polite"></pre>
    </section>
  </div>

  <div id="versionBadge" class="version-badge">loading version...</div>
  <script type="module" src="/main.js"></script>
</body>
</html>
